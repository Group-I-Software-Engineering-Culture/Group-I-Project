services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://seefit:seefit@db:5432/seefit
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=seefit
      - POSTGRES_PASSWORD=seefit
      - POSTGRES_DB=seefit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seefit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
