name: Production Deployment Pipeline

on:
  push:
    branches: [main]

jobs:
  lint:
    name: ESLint Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  test:
    name: Vitest Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t seefit:${{ github.sha }} .

      - name: Tag image as latest
        run: docker tag seefit:${{ github.sha }} seefit:latest

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build and start container
        run: |
          docker build -t seefit:health-check .
          docker run -d --name seefit-health -p 8080:8080 seefit:health-check

      - name: Wait for server to start
        run: sleep 5

      - name: Run health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Health check returned status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Stop container
        if: always()
        run: docker stop seefit-health && docker rm seefit-health

  dast:
    name: OWASP ZAP DAST Scan (Placeholder)
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - uses: actions/checkout@v4

      - name: OWASP ZAP Dynamic Security Testing
        run: |
          echo "=== OWASP ZAP DAST Scan ==="
          echo "This is a placeholder for OWASP ZAP dynamic application security testing."
          echo "To enable, uncomment the zaproxy/action-full-scan step below."
          echo "=== Scan skipped ==="

